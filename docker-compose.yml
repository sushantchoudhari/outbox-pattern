version: '3.9'

services:
  # ── Data Layer ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Run migrations once after postgres is healthy
  migrate:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./migrations:/migrations:ro
    command: psql -h postgres -U postgres -d appdb -f /migrations/001_init.sql
    restart: on-failure

  # ── Messaging / Infra Layer (LocalStack) ─────────────────────
  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=sns,sqs,lambda
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
      - LAMBDA_EXECUTOR=local
      - PERSISTENCE=0
    ports:
      - "4566:4566"
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Application Layer ────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    ports:
      - "3000:3000"

  # ── Event Publishing Layer ───────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      SNS_ENDPOINT: http://localstack:4566
      SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:application-events
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      POLL_INTERVAL_MS: 5000
      BATCH_SIZE: 10

volumes:
  postgres_data:
  localstack_data:
