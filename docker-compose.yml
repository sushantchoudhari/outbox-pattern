services:
  # ── Data Layer ──────────────────────────────────────────────
  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── Session Store (ElastiCache Redis in production) ──────────
  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Run migrations once after postgres is healthy
  migrate:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./migrations:/migrations:ro
    command: psql -h postgres -U postgres -d appdb -f /migrations/001_init.sql
    restart: on-failure

  # ── Messaging / Infra Layer (LocalStack) ─────────────────────
  localstack:
    image: public.ecr.aws/localstack/localstack:3
    environment:
      - SERVICES=sns,sqs,lambda
      - DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - DEBUG=0
      - LAMBDA_EXECUTOR=local
      - PERSISTENCE=0
      # These are passed to init-aws.sh so queue/topic names and
      # SQS settings can be changed via .env without editing scripts.
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SNS_TOPIC_NAME=${SNS_TOPIC_NAME:-application-events}
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME:-salesforce-integration-queue}
      - SQS_DLQ_NAME=${SQS_DLQ_NAME:-salesforce-integration-dlq}
      - SQS_VISIBILITY_TIMEOUT=${SQS_VISIBILITY_TIMEOUT:-30}
      - SQS_MAX_RECEIVE_COUNT=${SQS_MAX_RECEIVE_COUNT:-3}
    ports:
      - "4566:4566"
    volumes:
      - ./localstack:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Application Layer ────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    ports:
      - "3000:3000"

  # ── Event Publishing Layer ───────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      SNS_ENDPOINT: http://localstack:4566
      SNS_TOPIC_ARN: arn:aws:sns:${AWS_REGION:-us-east-1}:000000000000:${SNS_TOPIC_NAME:-application-events}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-5000}
      BATCH_SIZE: ${BATCH_SIZE:-10}

volumes:
  postgres_data:
  localstack_data:
